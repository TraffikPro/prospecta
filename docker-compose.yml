services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: prospecta
      POSTGRES_PASSWORD: prospecta
      POSTGRES_DB: prospecta
    volumes:
      - prospecta_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prospecta -d prospecta"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  prospecta_pg:
